<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Tutor - Dual Track</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badges {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge.personaplex { background: #ff6b6b; color: #fff; }
        .badge.claude { background: #cc785c; color: #fff; }

        .container { width: 100%; max-width: 600px; }

        .status-bar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #888;
            transition: all 0.3s;
        }

        .status-dot.connected { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .status-dot.listening { background: #ff6b6b; animation: pulse 1s infinite; }
        .status-dot.thinking { background: #cc785c; animation: pulse 0.5s infinite; }
        .status-dot.speaking { background: #00d2ff; animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .track-indicator {
            display: flex;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }

        .track {
            flex: 1;
            text-align: center;
            padding: 0.5rem;
            border-radius: 6px;
            opacity: 0.3;
            transition: all 0.3s;
        }

        .track.active { opacity: 1; }
        .track.personaplex.active { background: rgba(255, 107, 107, 0.2); }
        .track.claude.active { background: rgba(204, 120, 92, 0.2); }

        .conversation {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            min-height: 250px;
            max-height: 350px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: rgba(0, 210, 255, 0.2);
            margin-left: auto;
        }

        .message.filler {
            background: rgba(255, 107, 107, 0.2);
            border-left: 3px solid #ff6b6b;
        }

        .message.assistant {
            background: rgba(204, 120, 92, 0.2);
            border-left: 3px solid #cc785c;
        }

        .message-label {
            font-size: 0.65rem;
            color: #888;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            justify-content: center;
        }

        .talk-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .talk-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.4);
        }

        .talk-btn.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
        }

        .talk-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .talk-btn svg { width: 32px; height: 32px; }

        .info {
            margin-top: 2rem;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>History Tutor</h1>
    <div class="badges">
        <span class="badge personaplex">PersonaPlex Fast Track</span>
        <span class="badge claude">GPT-4o Deep Track</span>
    </div>

    <div class="container">
        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>

        <div class="track-indicator">
            <div class="track personaplex" id="trackPersonaplex">
                <div>PersonaPlex</div>
                <div style="font-size: 0.7rem; color: #888;">Fast Filler</div>
            </div>
            <div class="track claude" id="trackClaude">
                <div>GPT-4o</div>
                <div style="font-size: 0.7rem; color: #888;">Deep Response</div>
            </div>
        </div>

        <div class="conversation" id="conversation"></div>

        <div class="controls">
            <button class="talk-btn" id="talkBtn" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <span>Start</span>
            </button>
        </div>
    </div>

    <div class="info">
        <p>Click Start once for continuous conversation.</p>
        <p>Auto-detects when you stop speaking and sends. Click Stop to end.</p>
    </div>

    <script>
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const conversation = document.getElementById('conversation');
        const talkBtn = document.getElementById('talkBtn');
        const trackPersonaplex = document.getElementById('trackPersonaplex');
        const trackClaude = document.getElementById('trackClaude');

        let ws = null;
        let audioContext = null;
        let isRecording = false;
        let mediaStream = null;
        let processor = null;
        let continuousMode = false;  // Auto-listen after response
        let isSpeaking = false;  // Track if audio is playing
        let currentSource = null;  // Current audio source for stopping
        let audioQueue = [];  // Queue for sequential playback
        let isPlayingQueue = false;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Connected - Hold to talk';
                talkBtn.disabled = false;
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Disconnected...';
                talkBtn.disabled = true;
                setTimeout(connect, 2000);
            };

            ws.onmessage = async (event) => {
                if (event.data instanceof Blob) {
                    await playAudio(event.data);
                } else {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                }
            };
        }

        function handleMessage(msg) {
            console.log('Message:', msg);
            if (msg.type === 'status') {
                statusText.textContent = msg.message;

                // Update visual state
                if (msg.message.includes('Transcribing')) {
                    statusDot.className = 'status-dot thinking';
                } else if (msg.message.includes('filler')) {
                    statusDot.className = 'status-dot speaking';
                    trackPersonaplex.classList.add('active');
                    trackClaude.classList.remove('active');
                } else if (msg.message.includes('response') || msg.message.includes('Speaking')) {
                    statusDot.className = 'status-dot speaking';
                    trackClaude.classList.add('active');
                    trackPersonaplex.classList.remove('active');
                } else if (msg.message.includes('Ready')) {
                    statusDot.className = 'status-dot connected';
                    trackPersonaplex.classList.remove('active');
                    trackClaude.classList.remove('active');
                    // Update button for continuous mode
                    if (!isRecording && !isSpeaking) {
                        talkBtn.querySelector('span').textContent = continuousMode ? 'Listening...' : 'Start';
                    }
                }

                // Extract user speech
                if (msg.message.startsWith('You said:')) {
                    const text = msg.message.replace('You said:', '').trim();
                    addMessage('You', text, 'user');
                }
            } else if (msg.type === 'filler') {
                addMessage('PersonaPlex', msg.text, 'filler');
                speakText(msg.text);  // Browser TTS fallback
            } else if (msg.type === 'response') {
                addMessage('GPT-4o', msg.text, 'assistant');
                speakText(msg.text);  // Browser TTS fallback
            }
        }

        // Browser TTS fallback (only used if server TTS fails)
        function speakText(text) {
            if ('speechSynthesis' in window && !isSpeaking) {
                isSpeaking = true;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.onend = () => {
                    isSpeaking = false;
                    // Auto-listen after response in continuous mode
                    if (continuousMode && !isRecording) {
                        setTimeout(() => startRecording(), 300);
                    }
                };
                speechSynthesis.speak(utterance);
            }
        }

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                <div class="message-label">${sender}</div>
                <div>${text}</div>
            `;
            conversation.appendChild(div);
            conversation.scrollTop = conversation.scrollHeight;
        }

        // Stop all audio playback (for barge-in)
        function stopAllAudio() {
            console.log('Stopping all audio...');
            // Stop current audio source
            if (currentSource) {
                try {
                    currentSource.stop();
                } catch (e) {}
                currentSource = null;
            }
            // Clear queue
            audioQueue = [];
            isPlayingQueue = false;
            isSpeaking = false;
            // Stop browser TTS
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
            }
            // Stop barge-in monitoring
            if (bargeInCheckInterval) {
                clearInterval(bargeInCheckInterval);
                bargeInCheckInterval = null;
            }
        }

        // Start monitoring mic for barge-in while audio plays
        async function startBargeInMonitoring() {
            if (bargeInCheckInterval) return; // Already monitoring

            try {
                // Get persistent mic access if not already
                if (!persistentStream) {
                    persistentStream = await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: true, noiseSuppression: true }
                    });
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = ctx.createMediaStreamSource(persistentStream);
                    persistentAnalyser = ctx.createAnalyser();
                    persistentAnalyser.fftSize = 512;
                    source.connect(persistentAnalyser);
                }

                // Monitor for speech during playback
                bargeInCheckInterval = setInterval(() => {
                    if (!persistentAnalyser || !isSpeaking) {
                        clearInterval(bargeInCheckInterval);
                        bargeInCheckInterval = null;
                        return;
                    }

                    const dataArray = new Uint8Array(persistentAnalyser.fftSize);
                    persistentAnalyser.getByteTimeDomainData(dataArray);

                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const val = (dataArray[i] - 128) / 128;
                        sum += val * val;
                    }
                    const rms = Math.sqrt(sum / dataArray.length);

                    if (rms > BARGE_IN_THRESHOLD) {
                        console.log('BARGE-IN detected! RMS:', rms.toFixed(3));
                        // Stop monitoring first to prevent duplicate triggers
                        clearInterval(bargeInCheckInterval);
                        bargeInCheckInterval = null;
                        // Stop audio and start recording
                        stopAllAudio();
                        startRecording();
                    }
                }, 50); // Check every 50ms for faster response

            } catch (e) {
                console.error('Barge-in monitoring error:', e);
            }
        }

        async function playAudio(blob) {
            // Add to queue
            audioQueue.push(blob);
            if (!isPlayingQueue) {
                playNextInQueue();
            }
        }

        async function playNextInQueue() {
            if (audioQueue.length === 0) {
                isPlayingQueue = false;
                isSpeaking = false;
                // Auto-listen after all audio finishes
                if (continuousMode && !isRecording) {
                    setTimeout(() => startRecording(), 300);
                }
                return;
            }

            isPlayingQueue = true;
            isSpeaking = true;
            const blob = audioQueue.shift();

            // Start barge-in monitoring while audio plays
            if (continuousMode) {
                startBargeInMonitoring();
            }

            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                }

                const arrayBuffer = await blob.arrayBuffer();
                const int16Array = new Int16Array(arrayBuffer);
                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) {
                    float32Array[i] = int16Array[i] / 32768.0;
                }

                const audioBuffer = audioContext.createBuffer(1, float32Array.length, 24000);
                audioBuffer.getChannelData(0).set(float32Array);

                const source = audioContext.createBufferSource();
                currentSource = source;
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                source.onended = () => {
                    currentSource = null;
                    playNextInQueue();
                };
                source.start();
            } catch (e) {
                console.error('Audio error:', e);
                playNextInQueue();
            }
        }

        let audioChunks = [];
        let mediaRecorder = null;
        let analyser = null;
        let vadCheckInterval = null;
        let silenceStart = null;
        let hasSpeech = false;
        let persistentStream = null;  // Keep mic always open for barge-in
        let persistentAnalyser = null;
        let bargeInCheckInterval = null;
        const SILENCE_THRESHOLD = 0.02;   // Audio level threshold for speech detection
        const SILENCE_DURATION = 1000;   // 1 second of silence to auto-send
        const BARGE_IN_THRESHOLD = 0.08; // Much higher threshold for barge-in (avoid false triggers)

        async function startRecording() {
            try {
                console.log('Starting recording...');

                // BARGE-IN: Stop any playing audio when user starts speaking
                const wasPlaying = isSpeaking;
                stopAllAudio();

                // Only send barge-in if we were actually playing audio
                if (wasPlaying && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'barge_in' }));
                    console.log('Sent barge-in to server');
                }

                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });

                // Set up audio analyser for VAD
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(mediaStream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                source.connect(analyser);

                // Use MediaRecorder for capture
                mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
                audioChunks = [];
                hasSpeech = false;
                silenceStart = null;

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    console.log('Recording stopped, processing...');
                    clearInterval(vadCheckInterval);

                    if (audioChunks.length === 0 || !hasSpeech) {
                        console.log('No speech detected, skipping');
                        if (continuousMode) {
                            setTimeout(() => startRecording(), 500);
                        }
                        return;
                    }

                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    console.log('Audio blob size:', audioBlob.size);

                    // Convert to PCM
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    const decodeCtx = new (window.AudioContext || window.webkitAudioContext)();

                    try {
                        const audioBuffer = await decodeCtx.decodeAudioData(arrayBuffer);
                        const pcmData = audioBuffer.getChannelData(0);

                        const pcm16 = new Int16Array(pcmData.length);
                        for (let i = 0; i < pcmData.length; i++) {
                            pcm16[i] = Math.max(-32768, Math.min(32767, pcmData[i] * 32768));
                        }

                        console.log('Sending audio, samples:', pcm16.length);
                        ws.send(pcm16.buffer);
                    } catch (err) {
                        console.error('Audio decode error:', err);
                    }
                    decodeCtx.close();
                };

                mediaRecorder.start(100);
                isRecording = true;
                talkBtn.classList.add('active');
                talkBtn.querySelector('span').textContent = 'Listening...';
                statusDot.className = 'status-dot listening';
                statusText.textContent = 'Speak now... (auto-detects when you stop)';

                // Start VAD monitoring
                vadCheckInterval = setInterval(() => {
                    if (!analyser) return;

                    const dataArray = new Uint8Array(analyser.fftSize);
                    analyser.getByteTimeDomainData(dataArray);

                    // Calculate RMS
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const val = (dataArray[i] - 128) / 128;
                        sum += val * val;
                    }
                    const rms = Math.sqrt(sum / dataArray.length);

                    if (rms > SILENCE_THRESHOLD) {
                        // Speech detected
                        hasSpeech = true;
                        silenceStart = null;
                        statusText.textContent = 'Listening... (speaking)';
                    } else if (hasSpeech) {
                        // Silence after speech
                        if (!silenceStart) {
                            silenceStart = Date.now();
                        } else if (Date.now() - silenceStart > SILENCE_DURATION) {
                            // Auto-send after silence
                            console.log('Silence detected, auto-sending...');
                            stopRecording();
                        } else {
                            const remaining = Math.ceil((SILENCE_DURATION - (Date.now() - silenceStart)) / 1000);
                            statusText.textContent = `Silence detected... sending in ${remaining}s`;
                        }
                    }
                }, 100);

                console.log('Recording started with VAD');

            } catch (e) {
                console.error('Mic error:', e);
                statusText.textContent = 'Microphone error: ' + e.message;
            }
        }

        function stopRecording() {
            console.log('Stopping recording...');
            isRecording = false;
            talkBtn.classList.remove('active');
            talkBtn.querySelector('span').textContent = continuousMode ? 'Processing...' : 'Start';
            statusDot.className = 'status-dot thinking';

            clearInterval(vadCheckInterval);

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
            }
        }

        // Click toggles continuous conversation mode
        talkBtn.addEventListener('click', () => {
            if (!continuousMode) {
                // Start continuous mode
                continuousMode = true;
                startRecording();
            } else {
                // Stop continuous mode completely
                continuousMode = false;
                if (isRecording) {
                    stopRecording();
                }
                talkBtn.classList.remove('active');
                talkBtn.querySelector('span').textContent = 'Start';
                statusText.textContent = 'Stopped. Click Start to begin.';
            }
        });

        // Keep touch support for mobile
        talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); });
        talkBtn.addEventListener('touchend', (e) => { e.preventDefault(); talkBtn.click(); });

        connect();

        addMessage('Tutor', "Hello! I'm your history tutor. What would you like to learn about today?", 'assistant');
    </script>
</body>
</html>
